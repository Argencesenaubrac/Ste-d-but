<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>La quête des 11 clochers</title>

<style>
    html, 
body {
    height: 100%;
}
body {
    margin: 0;
    min-height: 100dvh; /* corrige le problème mobile */
    font-family: 'Segoe UI', sans-serif;
    text-align: center;

    background: linear-gradient(180deg, #a8c6d8, #eaf4f4);
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: #2f3e4e;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 30px 20px;
}

/* Logo principal */
.logo {
    max-width: 400px;
    margin-bottom: 20px;
}

/* Carte */
.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* Logo dans la carte */
.card-logo {
    max-width: 120px;
    margin-bottom: 15px;
}

/* Texte */
p {
    line-height: 1.6;
    margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <img src="Logo.png" alt="Logo" class="card-logo">

        <p>
        Les 11 clochers d’Argences en Aubrac veillent sur la vallée depuis des siècles.
        Chacun d’eux est lié à une histoire, un gardien, une mémoire.
        Mais avec le temps, ces histoires ont été oubliées…
        </p>

        <p>
        Aujourd’hui, certains lieux murmurent encore leurs secrets.
        </p>

        <p><strong>🧭Saurez-vous les découvrir ?</strong></p>

    </div>

</div>

</body>
</html>
